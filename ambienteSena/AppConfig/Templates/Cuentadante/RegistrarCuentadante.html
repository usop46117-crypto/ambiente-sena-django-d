{% include 'Inc/header.html' %}

{% if messages %}
{% for mensaje in messages %}
<div class="ui container" id="mensajes">
    <div class="ui {{ mensaje.tags }} message">
        <i class="close icon"></i>
        <div class="header">{{ mensaje }}</div>
    </div>
</div>
{% endfor %}
{% endif %}

<div class="ui container">
    <h1 class="ui header">Registrar Asignación de Ambiente</h1>
    <form action="" method="post" class="ui form" id="formulariocuentadante">
        {% csrf_token %}
        
        <div class="two fields">
            <div class="field">
                <label>Instructor Responsable:</label>
                <select name="instructor" id="instructor" class="ui search dropdown">
                    <option value="">Seleccione instructor</option>
                    {% for instructor in instructores %}
                    <option value="{{ instructor.id }}">{{ instructor.NombreCompleto }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="field">
                <label>Ambiente Asignado:</label>
                <select name="ambiente" id="ambiente" class="ui search dropdown">
                    <option value="">Seleccione el ambiente</option>
                    {% for ambiente in ambientes %}
                    <option value="{{ ambiente.id }}">{{ ambiente.NombreAmbiente }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="field">
            <label>Observación:</label>
            <textarea name="observacion" id="observacion" rows="3" placeholder="Ej: Entrega de llaves y control de aire..."></textarea>
        </div>

        <button type="submit" class="ui green button">
            <i class="save icon"></i> Guardar Asignación
        </button>
    </form>
</div>

{% include 'Inc/footer.html' %}

<script>
    $(document).ready(function() {
        $('.ui.dropdown').dropdown();

        $('#formulariocuentadante').form({
            inline: true,
            fields: {
                instructor: {
                    identifier: 'instructor',
                    rules: [{ type: 'empty', prompt: 'Seleccione un instructor' }]
                },
                ambiente: {
                    identifier: 'ambiente',
                    rules: [{ type: 'empty', prompt: 'Seleccione el ambiente' }]
                },
                observacion: {
                    identifier: 'observacion',
                    rules: [{ type: 'empty', prompt: 'Escriba una observación' }]
                }
            }
        });
    });
</script>
